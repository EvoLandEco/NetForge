site_name: NetForge
site_description: Temporal network block model fitting, generation, diagnostics, and simulation
repo_url: https://github.com/EvoLandEco/NetForge
repo_name: EvoLandEco/NetForge
edit_uri: edit/main/site_docs/
docs_dir: site_docs
site_dir: site
strict: true

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - content.action.edit
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            filters:
              - "!^_"
            heading_level: 2
            members_order: source
            separate_signature: true
            show_root_full_path: false
            show_root_heading: true
            show_signature_annotations: true
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

nav:
  - Overview: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Data Format: data-format.md
  - CLI: cli.md
  - Simulation: simulation.md
  - API Reference:
      - api/index.md
      - CLI module: api/cli.md
      - Pipeline module: api/pipeline.md
      - Diagnostics module: api/diagnostics.md
      - Simulation module: api/simulation.md
